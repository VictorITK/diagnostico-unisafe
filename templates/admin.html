<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - UNISAFE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2 class="mb-4">Gerador de Links UNISAFE</h2>
        
        <div class="card bg-secondary text-white p-4 mb-4">
            <form method="POST">
                <div class="mb-3">
                    <label>Senha de Acesso:</label>
                    <input type="password" name="senha" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Nome do Cliente (Empresa):</label>
                    <input type="text" name="nome_cliente" class="form-control" placeholder="Ex: Padaria do Joao" required>
                </div>
                <div class="mb-3">
                    <label>Setores (separados por vírgula):</label>
                    <input type="text" name="setores" class="form-control" placeholder="Ex: Producao, Vendas, Entrega" required>
                </div>
                <button type="submit" class="btn btn-warning fw-bold">GERAR LINK DE DIAGNÓSTICO</button>
            </form>
        </div>

        {% if mensagem %}
        <div class="alert alert-info">
            {{ mensagem }} <br>
            {% if link %}
            <strong>Link para o cliente:</strong> <input type="text" class="form-control" value="{{ link }}" readonly>
            {% endif %}
        </div>
        {% endif %}
    </div>
</body>
</html>
