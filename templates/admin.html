<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel UNISAFE - Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gerenciamento de Clientes UNISAFE</h2>
            <a href="/" class="btn btn-outline-secondary btn-sm">Sair</a>
        </div>
        
        <div class="card shadow-sm p-4 mb-5">
            <h5 class="mb-3">Cadastrar Nova Empresa</h5>
            <form method="POST" class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="nome_cliente" class="form-control" placeholder="Nome da Empresa" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="setores" class="form-control" placeholder="Setores (Ex: RH, Vendas, Oficina)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Salvar</button>
                </div>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm rounded">
                <thead class="table-dark">
                    <tr>
                        <th>Empresa</th>
                        <th>Setores</th>
                        <th>Link do Diagnóstico</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for id, nome, setores in empresas %}
                    <tr>
                        <td><strong>{{ nome }}</strong></td>
                        <td>{{ setores }}</td>
                        <td><small>{{ host }}?cliente={{ nome }}</small></td>
                        <td>
                            <a href="/deletar/{{ id }}" class="btn btn-danger btn-sm">Excluir</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
