<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - UNISAFE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 50px; text-align: center; max-width: 500px; }
        
        /* LOGO CENTRALIZADA NA TELA DE BLOQUEIO */
        .logo-unisafe { 
            max-width: 150px; 
            display: block; 
            margin: 0 auto 20px auto; 
            border-radius: 10px; 
            background: white; 
            padding: 5px; 
            border: 1px solid #ddd; 
        }
    </style>
</head>
<body>
    <div class="card bg-white">
        <img src="{{ url_for('static', filename='imagens/logo_unisafe.png') }}" alt="UNISAFE" class="logo-unisafe">
        <h1 style="color: #004a87;">Atenção</h1>
        <p class="lead">Você já participou desta pesquisa para <strong>{{ cliente }}</strong>.</p>
        <p>A <strong>UNISAFE</strong> garante a integridade do diagnóstico impedindo múltiplas respostas do mesmo dispositivo.</p>
    </div>
</body>
</html>
